<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe Game</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0077be,#001f3f);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container{
    max-width:700px;
    padding:20px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    font-size:1.2rem;
    line-height:1.6;
}

.play-btn{
    display:inline-block;
    margin-top:25px;
    padding:15px 35px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:1.2rem;
    transition:0.3s;
}

.play-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>🎮 Tic-Tac-Toe</h1>

    <p>
        Welcome to my Tic-Tac-Toe game.
        Challenge a friend or play against an AI with different difficulty levels.
    </p>

    <p>
        Built with HTML, CSS and JavaScript as part of my web development portfolio.
    </p>

    <a href="tik tac toe.html" class="play-btn">
        Play Game
    </a>
</div>

</body>
</html>
