<!DOCTYPE html>
<html>
<head>
  <title>Tic-Tac-Toe</title>
  <style>body {
font-family: Arial, sans-serif;
text-align: center;
background-color: #0077be;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  gap: 5px;
  margin: 20px auto;
  width: fit-content;
}
.cell {
width: 100px;
height: 100px;
background: midnightblue;
font-size: 40px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: transform 0.2s;
}

.cell.win {
background-color: #4CAF50;
color: orange;
animation: pop 0.3s ease;
}

@keyframes pop {
0% { transform: scale(1); }
50% { transform: scale(1.2); }
100% { transform: scale(1); }
}

.x {
color: red;
}

.o {
color: black;
}

button, select {
margin: 5px;
padding: 8px 16px;
}</style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="mode-buttons">
    <button id="ai-mode">Play with AI</button>
    <button id="two-player-mode">Play with Two Players</button>
  </div>
  <select id="difficulty" disabled>
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>
  <div id="game-board" class="board"></div>
  <p id="status"></p>
  <p id="score">X: 0 | O: 0
 </p>
  <button id="restart">Restart</button>
  <script>document.addEventListener('DOMContentLoaded', () => {
  let board = Array(9).fill('');
  let currentPlayer = 'X';
  let gameMode = '';
  let difficulty = 'easy';
  let scores = { X: 0, O: 0 };
  let gameActive = true;

  function createBoard() {
    const boardElement = document.getElementById('game-board');
    boardElement.innerHTML = '';
    board.forEach((cell, index) => {
      const cellElement = document.createElement('div');
      cellElement.classList.add('cell');
      cellElement.dataset.index = index;
      cellElement.textContent = cell;
      if (cell) cellElement.classList.add(cell === 'X' ? 'x' : 'o');
      cellElement.addEventListener('click', handleCellClick);
      boardElement.appendChild(cellElement);
    });
  }

  function handleCellClick(e) {
    const index = e.target.dataset.index;
    if (board[index] || !gameActive) return;
    board[index] = currentPlayer;
    e.target.textContent = currentPlayer;
    e.target.classList.add(currentPlayer === 'X' ? 'x' : 'o');
    animateMove(e.target);
    checkResult();
    if (gameMode === 'ai' && gameActive) {
      setTimeout(aiMove, 500);
    } else {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    }
  }
  

  function aiMove() {
    const emptyIndices = getEmptyIndices();
    let index;
    if (difficulty === 'hard') {
      index = blockOrStrategicMove(emptyIndices);
    } else if (difficulty === 'medium') {
      index = Math.random() < 0.5 ? emptyIndices[Math.floor(Math.random() * emptyIndices.length)] : blockOrStrategicMove(emptyIndices);
    } else {
      index = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
    }
    board[index] = 'O';
    const cell = document.querySelector(`[data-index="${index}"]`);
    cell.textContent = 'O';
    cell.classList.add('o');
    animateMove(cell);
    checkResult();
    currentPlayer = 'X';
  }

  function blockOrStrategicMove(emptyIndices) {
    for (let i of emptyIndices) {
      board[i] = 'X';
      if (checkWin(board, 'X')) {
        board[i] = '';
        return i;
      }
      board[i] = '';
    }
    const priority = [4, 0, 2, 6, 8];
    for (let p of priority) {
      if (emptyIndices.includes(p)) return p;
    }
    return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
  }

  function getEmptyIndices() {
    return board.map((val, idx) => val === '' ? idx : null).filter(v => v !== null);
  }

  function checkWin(b, player) {
    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];
    return winPatterns.some(pattern => pattern.every(i => b[i] === player));
  }

  function checkResult() {
    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];
    for (let pattern of winPatterns) {
      const [a, b, c] = pattern;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        document.querySelectorAll(`[data-index="${a}"], [data-index="${b}"], [data-index="${c}"]`)
          .forEach(el => el.classList.add('win'));
        scores[board[a]]++;
        document.getElementById('status').textContent = `${board[a]} wins!`;
        document.getElementById('score').textContent = `X: ${scores.X} | O: ${scores.O}`;
        gameActive = false;
        return;
      }
    }
    if (!board.includes('')) {
      document.getElementById('status').textContent = 'It’s a draw!';
      gameActive = false;
    }
  }

  function animateMove(cell) {
    cell.style.transform = 'scale(1.2)';
    setTimeout(() => (cell.style.transform = 'scale(1)'), 200);
  }

  document.getElementById('ai-mode').addEventListener('click', () => {
    gameMode = 'ai';
    document.getElementById('difficulty').disabled = false;
    resetGame();
  });
  document.getElementById('two-player-mode').addEventListener('click', () => {
    gameMode = 'two-player';
    document.getElementById('difficulty').disabled = true;
    resetGame();
  });
  document.getElementById('difficulty').addEventListener('change', e => {
    difficulty = e.target.value;
  });
  document.getElementById('restart').addEventListener('click', resetGame);

  function resetGame() {
    board.fill('');
    currentPlayer = 'X';
    gameActive = true;
    document.getElementById('status').textContent = '';
    createBoard();
  }

  createBoard();
  console.log("Game initialized!");
});</script>
</body>
</html>
